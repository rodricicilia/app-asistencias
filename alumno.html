<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>App Alumno</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: #333; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 0.9rem; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button.secondary { background: #6c757d; }
        button.danger { background: #dc3545; }
        .qr-container {
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 15px;
        }
        .qr-container img {
            max-width: 250px;
            width: 100%;
            margin: 10px auto;
            border: 3px solid #667eea;
            border-radius: 15px;
            padding: 10px;
            background: white;
        }
        .alert {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            display: none;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-error { background: #f8d7da; color: #721c24; }
        .alert-info { background: #d1ecf1; color: #0c5460; }
        .info-alumno {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button { margin-top: 0; }
        .separador {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
        .footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #999; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>📱 App Alumno</h1>
        <div class="subtitle">Registro de asistencia a pasantías</div>
        
        <div id="alert" class="alert"></div>
        
        <!-- Pantalla 1: Login -->
        <div id="pantallaLogin">
            <div class="form-group">
                <label>📄 DNI</label>
                <input type="number" id="loginDni" placeholder="Ingresá tu DNI">
            </div>
            <button id="btnLogin">🔑 Iniciar sesión</button>
            <div class="separador">o</div>
            <button id="btnMostrarRegistro" class="secondary">📝 Registrarme</button>
        </div>
        
        <!-- Pantalla 2: Registro -->
        <div id="pantallaRegistro" style="display: none;">
            <h3>📝 Registro de alumno</h3>
            <div class="form-group">
                <label>DNI</label>
                <input type="number" id="regDni" placeholder="DNI">
            </div>
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="regNombre" placeholder="Nombre">
            </div>
            <div class="form-group">
                <label>Apellido</label>
                <input type="text" id="regApellido" placeholder="Apellido">
            </div>
            <div class="form-group">
                <label>Lugar de práctica</label>
                <input type="text" id="regLugar" placeholder="Ej: Empresa X">
            </div>
            <button id="btnRegistrar">✅ Registrarme</button>
            <button id="btnVolverLogin" class="secondary" style="margin-top:10px;">← Volver</button>
        </div>
        
        <!-- Pantalla 3: QR -->
        <div id="pantallaQR" style="display: none;">
            <div class="info-alumno" id="infoAlumno"></div>
            <div id="qrcode" style="display: flex; justify-content: center;"></div>
            <div class="btn-group">
                <button id="btnGenerarQR" class="secondary">🔄 Generar QR de hoy</button>
                <button id="btnCerrarSesion" class="danger">🚪 Cerrar sesión</button>
            </div>
            <div class="footer" style="margin-top:15px;">
                ⏰ Válido por 24 horas<br>
                Mostrale este QR al supervisor
            </div>
        </div>
        
        <div class="footer">
            Generá un QR nuevo cada día antes de tu práctica
        </div>
    </div>

    <script>
        // ⚠️ CAMBIAR POR LA URL DE TU APPS SCRIPT ⚠️
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyKYIFV9suYC7u2cMy8wwghkuv4GEp99oRCHGj6smBQauTJ1QUQmjBmE4BPfTaVcFi_cg/exec';
        
        let alumnoActual = null;
        
        function mostrarAlerta(mensaje, tipo) {
            const div = document.getElementById('alert');
            div.textContent = mensaje;
            div.className = `alert alert-${tipo}`;
            div.style.display = 'block';
            setTimeout(() => div.style.display = 'none', 4000);
        }
        
        async function fetchJSON(url, options = {}) {
            try {
                const response = await fetch(url, options);
                return await response.json();
            } catch(e) { return null; }
        }
        
        async function buscarAlumno(dni) {
            return await fetchJSON(`${APPS_SCRIPT_URL}?action=buscarAlumno&dni=${dni}`);
        }
        
        async function guardarAlumno(dni, nombre, apellido, lugar) {
            const formData = new URLSearchParams();
            formData.append('dni', dni);
            formData.append('nombre', nombre);
            formData.append('apellido', apellido);
            formData.append('lugarPractica', lugar);
            
            const response = await fetch(`${APPS_SCRIPT_URL}?action=guardarAlumno`, {
                method: 'POST',
                body: formData
            });
            return await response.json();
        }
        
        function generarQR(dni) {
            const hoy = new Date();
            const fecha = hoy.toISOString().split('T')[0];
            // La URL para el supervisor (web independiente)
            const SUPERVISOR_URL = 'https://rodricicilia.github.io/app-asistencias/supervisor.html'; // CAMBIAR POR URL REAL
            const qrText = `${SUPERVISOR_URL}?dni=${dni}&fecha=${fecha}`;
            
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), {
                text: qrText,
                width: 250,
                height: 250
            });
        }
        
        async function login(dni) {
            if (!dni) { mostrarAlerta('Ingresá tu DNI', 'error'); return false; }
            
            mostrarAlerta('Buscando...', 'info');
            const alumno = await buscarAlumno(dni);
            
            if (alumno && alumno.idAlumno) {
                alumnoActual = alumno;
                localStorage.setItem('alumnoActual', JSON.stringify(alumnoActual));
                mostrarPantallaQR();
                mostrarAlerta(`✅ Bienvenido ${alumno.nombre}`, 'success');
                return true;
            } else {
                mostrarAlerta('❌ DNI no registrado', 'error');
                return false;
            }
        }
        
        async function registrar(dni, nombre, apellido, lugar) {
            if (!dni || !nombre || !apellido || !lugar) {
                mostrarAlerta('Completá todos los campos', 'error');
                return false;
            }
            
            const btn = document.getElementById('btnRegistrar');
            btn.disabled = true;
            btn.innerHTML = 'Registrando...';
            
            try {
                const existe = await buscarAlumno(dni);
                if (existe && existe.idAlumno) {
                    mostrarAlerta('❌ DNI ya registrado', 'error');
                    return false;
                }
                
                const resultado = await guardarAlumno(dni, nombre, apellido, lugar);
                if (resultado.success) {
                    const alumno = await buscarAlumno(dni);
                    alumnoActual = alumno;
                    localStorage.setItem('alumnoActual', JSON.stringify(alumnoActual));
                    mostrarPantallaQR();
                    mostrarAlerta('✅ Registro exitoso', 'success');
                    return true;
                }
            } catch(e) {
                mostrarAlerta('Error de conexión', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✅ Registrarme';
            }
            return false;
        }
        
        function mostrarPantallaLogin() {
            document.getElementById('pantallaLogin').style.display = 'block';
            document.getElementById('pantallaRegistro').style.display = 'none';
            document.getElementById('pantallaQR').style.display = 'none';
        }
        
        function mostrarPantallaRegistro() {
            document.getElementById('pantallaLogin').style.display = 'none';
            document.getElementById('pantallaRegistro').style.display = 'block';
            document.getElementById('pantallaQR').style.display = 'none';
        }
        
        function mostrarPantallaQR() {
            document.getElementById('pantallaLogin').style.display = 'none';
            document.getElementById('pantallaRegistro').style.display = 'none';
            document.getElementById('pantallaQR').style.display = 'block';
            
            document.getElementById('infoAlumno').innerHTML = `
                <strong>👤 ${alumnoActual.nombre} ${alumnoActual.apellido || ''}</strong><br>
                📄 DNI: ${alumnoActual.dni}<br>
                🏢 ${alumnoActual.lugarPractica || 'No especificado'}
            `;
            generarQR(alumnoActual.dni);
        }
        
        function cerrarSesion() {
            localStorage.removeItem('alumnoActual');
            alumnoActual = null;
            mostrarPantallaLogin();
            mostrarAlerta('Sesión cerrada', 'info');
        }
        
        // Eventos
        document.getElementById('btnLogin').onclick = () => login(document.getElementById('loginDni').value);
        document.getElementById('btnMostrarRegistro').onclick = () => mostrarPantallaRegistro();
        document.getElementById('btnVolverLogin').onclick = () => mostrarPantallaLogin();
        document.getElementById('btnRegistrar').onclick = () => {
            const dni = document.getElementById('regDni').value;
            const nombre = document.getElementById('regNombre').value;
            const apellido = document.getElementById('regApellido').value;
            const lugar = document.getElementById('regLugar').value;
            registrar(dni, nombre, apellido, lugar);
        };
        document.getElementById('btnGenerarQR').onclick = () => generarQR(alumnoActual.dni);
        document.getElementById('btnCerrarSesion').onclick = () => cerrarSesion();
        
        // Cargar sesión
        const guardado = localStorage.getItem('alumnoActual');
        if (guardado) {
            try {
                alumnoActual = JSON.parse(guardado);
                mostrarPantallaQR();
            } catch(e) { mostrarPantallaLogin(); }
        } else {
            mostrarPantallaLogin();
        }
    </script>
</body>
</html>
